<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PMBIA">
<title>PMBIA Quick Reference</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-180.png">
<link rel="apple-touch-icon" sizes="512x512" href="./apple-touch-icon.png">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #141929;
    --surface2: #1e2640;
    --border: #2a3352;
    --accent: #00d4a0;
    --accent2: #f5a623;
    --red: #ff6b6b;
    --text: #e8edf8;
    --text2: #8899bb;
    --what: #3b82f6;
    --why: #f5a623;
    --how: #00d4a0;
    --keyword: #c084fc;
    --analogy: #fb923c;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  /* ── HEADER ── */
  #header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 10px) 16px 10px;
    flex-shrink: 0;
    z-index: 10;
  }

  .header-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  #back-btn {
    display: none;
    background: var(--surface2);
    border: none;
    color: var(--accent);
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.2px;
    flex-shrink: 0;
  }

  #page-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }

  .logo {
    font-size: 13px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* ── SEARCH ── */
  #search-wrap {
    position: relative;
  }

  #search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px 9px 36px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    -webkit-appearance: none;
  }

  #search::placeholder { color: var(--text2); }
  #search:focus { border-color: var(--accent); }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text2);
    font-size: 15px;
    pointer-events: none;
  }

  /* ── SCROLL AREA ── */
  #content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px 16px;
    padding-bottom: calc(var(--safe-bottom) + 70px);
  }

  /* ── BOTTOM NAV ── */
  #nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 10;
  }

  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text2);
    padding: 8px 4px 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: color 0.15s;
  }

  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; line-height: 1; }

  /* ── HOME GRID ── */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text2);
    margin: 16px 0 8px;
  }

  .section-title:first-child { margin-top: 4px; }

  .quick-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 4px;
  }

  .quick-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.15s;
    active: background var(--surface2);
  }

  .quick-card:active { background: var(--surface2); transform: scale(0.98); }

  .quick-card-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .quick-card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .quick-card-sub {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
  }

  /* ── LIST ITEMS ── */
  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.15s;
  }

  .list-item:active { background: var(--surface2); }

  .list-item-icon {
    font-size: 22px;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
  }

  .list-item-body { flex: 1; }

  .list-item-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .list-item-sub {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }

  .list-item-arrow {
    color: var(--text2);
    font-size: 14px;
  }

  /* ── SKILL BADGE ── */
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 5px;
    margin-right: 4px;
  }

  .badge-sb   { background: rgba(59,130,246,0.2);  color: #60a5fa; }
  .badge-c    { background: rgba(245,166,35,0.2);  color: #fbbf24; }
  .badge-ta   { background: rgba(0,212,160,0.2);   color: #00d4a0; }
  .badge-dc   { background: rgba(192,132,252,0.2); color: #c084fc; }
  .badge-pc   { background: rgba(251,146,60,0.2);  color: #fb923c; }
  .badge-tc   { background: rgba(244,63,94,0.2);   color: #f87171; }

  /* ── DETAIL PAGE ── */
  .detail-header {
    margin-bottom: 16px;
  }

  .detail-skill-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .detail-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .detail-goal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }

  .goal-row {
    display: flex;
    gap: 8px;
    margin-bottom: 5px;
  }

  .goal-row:last-child { margin-bottom: 0; }

  .goal-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .gl-what { background: rgba(59,130,246,0.25); color: #60a5fa; }
  .gl-why  { background: rgba(245,166,35,0.25); color: #fbbf24; }
  .gl-how  { background: rgba(0,212,160,0.25);  color: #00d4a0; }

  .goal-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }

  .goal-text strong { color: var(--accent); }

  /* ── CONTENT BLOCKS ── */
  .block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .block-title {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .block-title-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .body-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .body-text:last-child { margin-bottom: 0; }

  .bullet-list {
    list-style: none;
    padding: 0;
  }

  .bullet-list li {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    padding: 4px 0 4px 18px;
    position: relative;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .bullet-list li:last-child { border-bottom: none; }

  .bullet-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 12px;
    top: 5px;
  }

  .keyword-block {
    background: rgba(192,132,252,0.08);
    border: 1px solid rgba(192,132,252,0.25);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 10px;
    font-size: 13px;
    color: #c084fc;
    font-weight: 600;
  }

  .keyword-block::before {
    content: 'KEYWORDS  ';
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    opacity: 0.7;
    display: block;
    margin-bottom: 3px;
  }

  .analogy-block {
    background: rgba(251,146,60,0.08);
    border: 1px solid rgba(251,146,60,0.25);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 10px;
    font-size: 13px;
    color: #fb923c;
  }

  .analogy-block::before {
    content: 'ANALOGIES  ';
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    opacity: 0.7;
    display: block;
    margin-bottom: 3px;
  }

  .warn-block {
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.25);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--red);
  }

  .warn-block::before {
    content: '⚠ SAFETY  ';
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    opacity: 0.7;
    display: block;
    margin-bottom: 3px;
  }

  .info-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .info-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text2);
  }

  .info-chip strong { color: var(--text); }

  .phase-header {
    background: linear-gradient(135deg, var(--surface2), var(--surface));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .phase-header:active { opacity: 0.85; }

  .phase-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .phase-sub {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }

  .phase-chevron {
    color: var(--text2);
    font-size: 16px;
    transition: transform 0.2s;
  }

  .phase-content {
    display: none;
    margin-bottom: 10px;
  }

  .phase-content.open { display: block; }

  /* ── SEARCH RESULTS ── */
  .search-results { }

  .search-result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
  }

  .search-result-item:active { background: var(--surface2); }

  .sr-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .sr-context {
    font-size: 12px;
    color: var(--text2);
    margin-top: 3px;
  }

  .sr-match {
    font-size: 12px;
    color: var(--accent);
    margin-top: 3px;
    font-style: italic;
  }

  /* step numbers */
  .steps { counter-reset: steps; list-style: none; }
  .steps li {
    counter-increment: steps;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    padding: 6px 0 6px 30px;
    position: relative;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .steps li:last-child { border-bottom: none; }
  .steps li::before {
    content: counter(steps);
    position: absolute;
    left: 0;
    top: 6px;
    background: var(--accent);
    color: var(--bg);
    font-size: 10px;
    font-weight: 800;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 10px 0;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
    font-size: 14px;
  }

  .highlight { color: var(--accent); font-weight: 700; }

  /* sub-item list on skills overview */
  .skill-overview-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .skill-overview-item:active { background: var(--surface2); }

  .soi-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .soi-title {
    font-size: 15px;
    font-weight: 700;
  }

  .soi-sub {
    font-size: 12px;
    color: var(--text2);
    margin-top: 3px;
  }

</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="header-row">
      <button id="back-btn" onclick="goBack()">← Back</button>
      <div id="page-title"><span class="logo">PMBIA</span> Quick Reference</div>
    </div>
    <div id="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search" type="search" placeholder="Search skills, lessons, keywords…" 
             oninput="handleSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content"></div>

  <!-- BOTTOM NAV -->
  <div id="nav">
    <button class="nav-btn active" id="nav-home" onclick="showPage('home')">
      <span class="nav-icon">🏠</span>Home
    </button>
    <button class="nav-btn" id="nav-skills" onclick="showPage('skills')">
      <span class="nav-icon">⚡</span>Skills
    </button>
    <button class="nav-btn" id="nav-lessons" onclick="showPage('lessons')">
      <span class="nav-icon">📖</span>Lessons
    </button>
    <button class="nav-btn" id="nav-moves" onclick="showPage('moves')">
      <span class="nav-icon">🚵</span>Moves
    </button>
  </div>

</div>

<script>

// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════

const SKILLS = [
  {
    id: 'sb',
    icon: '⚖️',
    name: 'Stability & Balance',
    type: 'Bio-Mechanical',
    badgeClass: 'badge-sb',
    tagline: 'Strong position + range of movement',
    overview: `Stability is the ability to resist forces through a strong riding position. Balance is managing instability through range of movement. Together they are the most fundamental skill in mountain biking.\n\nA more centred position makes the rider more stable. A lower position can also improve stability but may cause more fatigue. The key is constantly adjusting between positions to manage position, strength and efficiency.\n\nChin over stem and hips over bottom bracket are two key signs of a stable rider, ready to react and balance.`,
    components: [
      {
        id: 'neutral',
        name: 'Neutral Position',
        what: 'Learn how to descend using the Neutral Position',
        why: 'This position provides good stability while helping the rider save energy and stay relaxed',
        how: 'Stand up TALL & RELAXED with PEDALS LEVEL and CHIN OVER STEM to be centred between the two wheels. Great for traction. Heels dropped to help extend the knees so muscles can relax.',
        keywords: 'Position → Stability → Efficiency → Less Fatigue',
        analogies: 'Picnic table vs. lamp post — low and stable vs. tall and wobbly',
        points: [
          'Chin over stem — centred between the two wheels',
          'Pedals level — helps distribute weight evenly',
          'Heels dropped — extends knees so muscles can relax',
          'Tall and relaxed — less tiring, great for efficiency',
          'Less fore-aft range of movement than Ready'
        ]
      },
      {
        id: 'ready',
        name: 'Ready Position',
        what: 'Learn how to descend using the Ready Position',
        why: 'This position offers more stability and range of movement for faster or more difficult sections of trail. Good for corners.',
        how: 'Same as Neutral but LOWER & WIDER. Bend elbows and hinge at the waist FIRST. Bend the knees only if needed. Think of it as a READY "DIAL" — use only as much as you need, because being low is also more tiring.',
        keywords: 'Position → Stability → Resistance to Forces → Range of Movement → Balance',
        analogies: 'Monster truck vs. race car | Clothes line to stay low | Ready "dial" — use only as much as needed',
        points: [
          'Same as Neutral but lower and wider',
          'Hinge at the waist and bend elbows FIRST',
          'Flex knees only if needed — not as default',
          'Chin stays over stem — stay centred',
          'More stability and range of movement',
          'More tiring — treat it as a dial, not a switch'
        ]
      },
      {
        id: 'climbing',
        name: 'Seated Climbing Position',
        what: 'Learn how to climb with more control and confidence',
        why: 'So our climbing is more efficient and we can tackle steeper terrain more successfully',
        how: 'Slide the HIPS FORWARD on the seat and HINGE AT THE WAIST to lower your chest to the bars. Lowering the wrists can also help.',
        keywords: 'Position → Stability → Front wheel stays down',
        analogies: 'Get low and sniff the donut on the front wheel! | If the seat is uncomfortable… your hips are forward!',
        points: [
          'Hips forward on the seat',
          'Chest low — hinge at the waist, NOT by hunching the back',
          'Wrists low as needed',
          'Keeps the front wheel weighted and tracking',
          'Maintains traction on the rear wheel',
          'If the seat feels uncomfortable, hips are in the right place'
        ],
        cues: ['Hips forward, chest low', 'Relax your grip — piano hands', 'Can you feel the front wheel staying down?'],
        see_bad: 'Elbows tucking in, front wheel lifting, sitting too upright, gripping tight',
        see_good: 'Hips forward, chest low, relaxed grip, front wheel weighted and down'
      },
      {
        id: 'hover',
        name: 'Hover Climbing (Steeper Terrain)',
        what: 'Learn to climb steeper terrain with the hover position',
        why: 'On steeper gradients, a seated position alone may not keep enough weight over the front wheel',
        how: 'Raise the hips about ONE INCH above the seat. Hinge at the waist using core muscles to keep weight low and centred, keeping hips over the rear wheel for grip and chest low over the bars for balance.',
        keywords: 'Hips ONE inch off seat → not standing up → chest low',
        analogies: 'Think "hover" not "stand up"',
        points: [
          'Hips ONE inch above seat — not standing up',
          'Hinge at the waist — keep weight low',
          'Hips over rear wheel for traction',
          'Chest low over bars for front wheel weight',
          'Contrast: show standing tall vs hovering'
        ]
      },
      {
        id: 'rom',
        name: 'Range of Movement & Balance',
        what: 'Use fore-aft and lateral movement to manage balance',
        why: 'A rider is never 100% stable — range of movement allows them to react and recover without falling',
        how: 'Move the bike fore-aft under your body to feel the difference. Too far back = strain in fingers. Too far forward = strain on shoulders. Centred = relaxed grip, mobile body. Repeat side to side for lateral balance.',
        keywords: 'ROM → Balance → Relaxed → Recovery Mode vs Drive Mode',
        analogies: null,
        points: [
          'Moving the BIKE is quicker — better for larger, faster corrections',
          'Moving the BODY is slower — better for gradual, smaller adjustments',
          'Good balance uses both together',
          'Centred = relaxed grip, mobile, can move in any direction',
          'Too stiff = less ROM = harder to react = easier to crash'
        ]
      }
    ]
  },
  {
    id: 'c',
    icon: '⚙️',
    name: 'Controls',
    type: 'Mechanical',
    badgeClass: 'badge-c',
    tagline: 'Gears, braking & dropper post',
    overview: `Controls is the mechanical skill — operating the gears, brakes and dropper post. Without proper gear selection or speed control, mountain biking becomes dangerous.\n\nGears Skill Goal: Achieve efficiency by maintaining a consistent cadence (60–90rpm) regardless of speed, terrain or strength.\n\nBraking Skill Goal: Control speed without skidding.`,
    components: [
      {
        id: 'cadence',
        name: 'Cadence & Gears',
        what: 'Learn how to use gears to maintain the correct cadence',
        why: 'To be more efficient — make riding easier, the climbs less tiring and the trails more fun',
        how: 'Change gears according to speed and terrain to maintain a consistent cadence at all times… one that you can accelerate with.',
        keywords: 'A.C.E — Accelerate, Comfortable, Efficient | 60–90rpm',
        analogies: "Car engine revs — too slow it stalls, too fast burns fuel. Find the 'jog zone'. | Running pace: walking (too slow), sprinting (burns out), jogging (all day).",
        points: [
          'Cadence = how fast you pedal (rpm)',
          'Good cadence: 60–90rpm — you can ACCELERATE, it\'s COMFORTABLE and EFFICIENT',
          'Too fast cadence = gear too easy = can\'t accelerate',
          'Too slow cadence = gear too hard = legs burn out',
          'Change gear whenever speed or terrain changes',
          'Focus on cadence feel, not which specific gear',
          '"Cruise Mode" = the gear you could ride all day'
        ],
        exercises: [

let currentPage = 'home';
let pageStack = [];

// ═══════════════════════════════════════

function setActiveNav(tab) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + tab);
  if (btn) btn.classList.add('active');
}

function showPage(page, data, title) {
  // Reset search
  const s = document.getElementById('search');
  if (s.value && page !== 'search') {
    s.value = '';
  }

  currentPage = page;
  currentView = data || null;

  const backBtn = document.getElementById('back-btn');
  const pageTitle = document.getElementById('page-title');
  const content = document.getElementById('content');

  content.scrollTop = 0;

  switch(page) {
    case 'home':
      pageStack = [];
      backBtn.style.display = 'none';
      pageTitle.innerHTML = '<span class="logo">PMBIA</span> Quick Reference';
      setActiveNav('home');
      renderHome();
      break;
    case 'skills':
      pageStack = [];
      backBtn.style.display = 'none';
      pageTitle.textContent = 'Six Skills';
      setActiveNav('skills');
      renderSkillsList();
      break;
    case 'lessons':
      pageStack = [];
      backBtn.style.display = 'none';
      pageTitle.textContent = 'Example Lessons';
      setActiveNav('lessons');
      renderLessonsList();
      break;
    case 'moves':
      pageStack = [];
      backBtn.style.display = 'none';
      pageTitle.textContent = 'Foundation Maneuvers';
      setActiveNav('moves');
      renderMovesList();
      break;
    case 'skill-detail':
      pageStack.push({ page: 'skills', title: 'Six Skills' });
      backBtn.style.display = 'inline-flex';
      pageTitle.textContent = data.name;
      renderSkillDetail(data);
      break;
    case 'component-detail':
      pageStack.push({ page: currentPage === 'home' ? 'home' : 'skill-detail' });
      backBtn.style.display = 'inline-flex';
      pageTitle.textContent = data.component.name;
      renderComponentDetail(data.skill, data.component);
      break;
    case 'lesson-detail':
      pageStack.push({ page: 'lessons', title: 'Example Lessons' });
      backBtn.style.display = 'inline-flex';
      pageTitle.textContent = data.name;
      renderLessonDetail(data);
      break;
    case 'move-detail':
      pageStack.push({ page: 'moves', title: 'Maneuvers' });
      backBtn.style.display = 'inline-flex';
      pageTitle.textContent = data.name;
      renderMoveDetail(data);
      break;
    case 'search':
      backBtn.style.display = 'none';
      pageTitle.innerHTML = '<span class="logo">PMBIA</span> Quick Reference';
      renderSearch(title); // title = query
      break;
  }
}

function goBack() {
  if (pageStack.length === 0) {
    showPage('home');
    return;
  }
  const prev = pageStack.pop();
  if (prev.page === 'home') showPage('home');
  else if (prev.page === 'skills') showPage('skills');
  else if (prev.page === 'lessons') showPage('lessons');
  else if (prev.page === 'moves') showPage('moves');
  else if (prev.page === 'skill-detail' && currentView) {
    showPage('skill-detail', currentView.skill || currentView);
  } else showPage('home');
}

function handleSearch(q) {
  if (!q || q.length < 2) {
    if (currentPage === 'search') {
      showPage('home');
    }
    return;
  }
  showPage('search', null, q);
}

function renderSearch(query) {
  const content = document.getElementById('content');
  const q = query.toLowerCase();
  let results = [];

  // Search skills
  SKILLS.forEach(skill => {
    if (skill.name.toLowerCase().includes(q) || skill.overview.toLowerCase().includes(q)) {
      results.push({ type: 'skill', icon: skill.icon, title: skill.name, sub: skill.type, match: skill.tagline, action: () => showPage('skill-detail', skill) });
    }
    skill.components.forEach(comp => {
      const searchText = [comp.name, comp.what, comp.why, comp.how, comp.keywords, comp.analogies, (comp.points||[]).join(' ')].join(' ').toLowerCase();
      if (searchText.includes(q)) {
        results.push({ type: 'component', icon: skill.icon, title: comp.name, sub: skill.name, match: getMatchContext(searchText, q), action: () => { pageStack = [{page:'skills'}]; document.getElementById('back-btn').style.display='inline-flex'; document.getElementById('page-title').textContent = comp.name; renderComponentDetail(skill, comp); currentView = {skill, component: comp}; } });
      }
    });
  });

  // Search lessons
  LESSONS.forEach(lesson => {
    const searchText = [lesson.name, lesson.what, lesson.why, lesson.how, lesson.keywords, lesson.analogies, lesson.studentGoal, (lesson.phases||[]).map(p=>[p.title, p.content, (p.points||[]).join(' '), (p.steps||[]).join(' ')].join(' ')).join(' ')].join(' ').toLowerCase();
    if (searchText.includes(q)) {
      results.push({ type: 'lesson', icon: lesson.icon, title: lesson.name, sub: lesson.skillName, match: getMatchContext(searchText, q), action: () => showPage('lesson-detail', lesson) });
    }
  });

  // Search moves
  MOVES.forEach(move => {
    const searchText = [move.name, move.why, move.how, move.steps.join(' '), move.cues.join(' ')].join(' ').toLowerCase();
    if (searchText.includes(q)) {
      results.push({ type: 'move', icon: move.icon, title: move.name, sub: 'Foundation Maneuver', match: getMatchContext(searchText, q), action: () => showPage('move-detail', move) });
    }
  });

  if (results.length === 0) {
    content.innerHTML = `<div class="empty-state">
      <div style="font-size:32px;margin-bottom:12px">🔍</div>
      <div>No results for "<strong>${query}</strong>"</div>
      <div style="margin-top:8px;font-size:12px">Try: climb, brake, neutral, ready, cadence, scanning, corner</div>
    </div>`;
    return;
  }

  let html = `<div class="section-title">${results.length} result${results.length!==1?'s':''} for "${query}"</div>`;
  results.forEach((r, i) => {
    html += `<div class="search-result-item" onclick="searchResults[${i}].action()">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:18px">${r.icon}</span>
        <div>
          <div class="sr-title">${r.title}</div>
          <div class="sr-context">${r.sub}</div>
          ${r.match ? `<div class="sr-match">"…${r.match}…"</div>` : ''}
        </div>
      </div>
    </div>`;
  });
  content.innerHTML = html;
  window.searchResults = results;
}

function getMatchContext(text, q) {
  const idx = text.indexOf(q);
  if (idx === -1) return null;
  const start = Math.max(0, idx - 20);
  const end = Math.min(text.length, idx + q.length + 30);
  return text.substring(start, end).trim();
}

function safeJSON(obj) {
  return JSON.stringify(obj)
    .replace(/'/g, "\\'")
    .replace(/"/g, '&quot;');
}

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// Initial render
showPage('home');

// Focus search on Cmd+F / Ctrl+F equivalent behaviour
document.getElementById('search').addEventListener('focus', function() {
  this.select();
});

</script>
</body>
